version: "3.9"

services:

  # ─────────────────────────────────────────────
  # API GATEWAY  (public entry point — port 5000)
  # ─────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    environment:
      - PRODUCTS_SERVICE_URL=http://products-service:5001
      - USERS_SERVICE_URL=http://users-service:5002
      - ORDERS_SERVICE_URL=http://orders-service:5003
      - PAYMENTS_SERVICE_URL=http://payments-service:5004
    depends_on:
      - products-service
      - users-service
      - orders-service
      - payments-service
    restart: on-failure
    networks:
      - lirio-net

  # ─────────────────────────────────────────────
  # PRODUCTS SERVICE
  # ─────────────────────────────────────────────
  products-service:
    build: ./products-service
    container_name: products-service
    environment:
      - DATABASE_URL=postgresql://lirio:lirio_pass@db-products:5432/products_db
      - PORT=5001
    depends_on:
      db-products:
        condition: service_healthy
    restart: on-failure
    networks:
      - lirio-net

  db-products:
    image: postgres:15-alpine
    container_name: db-products
    environment:
      POSTGRES_USER: lirio
      POSTGRES_PASSWORD: lirio_pass
      POSTGRES_DB: products_db
    volumes:
      - pgdata-products:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lirio -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lirio-net

  # ─────────────────────────────────────────────
  # USERS SERVICE
  # ─────────────────────────────────────────────
  users-service:
    build: ./users-service
    container_name: users-service
    environment:
      - DATABASE_URL=postgresql://lirio:lirio_pass@db-users:5432/users_db
      - PORT=5002
      - JWT_SECRET_KEY=lirio-del-valle-super-secret-jwt-2024
    depends_on:
      db-users:
        condition: service_healthy
    restart: on-failure
    networks:
      - lirio-net

  db-users:
    image: postgres:15-alpine
    container_name: db-users
    environment:
      POSTGRES_USER: lirio
      POSTGRES_PASSWORD: lirio_pass
      POSTGRES_DB: users_db
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lirio -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lirio-net

  # ─────────────────────────────────────────────
  # ORDERS SERVICE
  # ─────────────────────────────────────────────
  orders-service:
    build: ./orders-service
    container_name: orders-service
    environment:
      - DATABASE_URL=postgresql://lirio:lirio_pass@db-orders:5432/orders_db
      - PORT=5003
    depends_on:
      db-orders:
        condition: service_healthy
    restart: on-failure
    networks:
      - lirio-net

  db-orders:
    image: postgres:15-alpine
    container_name: db-orders
    environment:
      POSTGRES_USER: lirio
      POSTGRES_PASSWORD: lirio_pass
      POSTGRES_DB: orders_db
    volumes:
      - pgdata-orders:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lirio -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lirio-net

  # ─────────────────────────────────────────────
  # PAYMENTS SERVICE
  # ─────────────────────────────────────────────
  payments-service:
    build: ./payments-service
    container_name: payments-service
    environment:
      - DATABASE_URL=postgresql://lirio:lirio_pass@db-payments:5432/payments_db
      - PORT=5004
    depends_on:
      db-payments:
        condition: service_healthy
    restart: on-failure
    networks:
      - lirio-net

  db-payments:
    image: postgres:15-alpine
    container_name: db-payments
    environment:
      POSTGRES_USER: lirio
      POSTGRES_PASSWORD: lirio_pass
      POSTGRES_DB: payments_db
    volumes:
      - pgdata-payments:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lirio -d payments_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lirio-net

networks:
  lirio-net:
    driver: bridge

volumes:
  pgdata-products:
  pgdata-users:
  pgdata-orders:
  pgdata-payments:
